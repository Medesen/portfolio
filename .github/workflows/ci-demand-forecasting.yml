name: CI - Demand Forecasting

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'demand_forecasting/**'
      - '.github/workflows/ci-demand-forecasting.yml'
  pull_request:
    branches: [main]
    paths:
      - 'demand_forecasting/**'
      - '.github/workflows/ci-demand-forecasting.yml'
  workflow_dispatch:

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demand_forecasting

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (from lock file)
        run: |
          pip install --upgrade pip
          pip install -r requirements.lock
          pip install --no-deps .

      - name: Lint (ruff — syntax errors and the full F rule class)
        run: |
          pip install ruff
          ruff check --select E9,F .

      - name: Run tests
        run: |
          pytest tests/ -v
