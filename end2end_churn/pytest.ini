[pytest]
# pytest configuration
# Note: pythonpath=. allows imports from project root without sys.path hacks
pythonpath = .
# Test discovery patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Command-line options applied by default
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --ignore=mlruns
    --ignore=mlartifacts

# Custom markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (test component interactions)
    slow: Tests that take more than 1 second
    api: API endpoint tests
    e2e: End-to-end workflow tests

# Logging
log_cli = false
log_cli_level = INFO

# Coverage configuration lives in .coveragerc (coverage.py does not read
# pytest.ini, so [coverage:*] sections here would be silently ignored).

