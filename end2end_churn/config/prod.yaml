# Production-style Configuration
# Same data and MLflow store as the default config, but with the thorough
# hyperparameter search and stricter validation a production training run
# would use. Runnable as-is via `make train-prod`.

data:
  # In a real deployment this would point at an immutable production data
  # snapshot (e.g. object storage); here it uses the bundled dataset so the
  # documented command actually runs.
  data_path: "data/dataset.arff"
  random_state: 42
  test_size: 0.15                              # More data for training
  val_size: 0.15                               # Smaller validation set
  stratify: true

model:
  model_type: "random_forest"                  # Model type: random_forest, xgboost, or logistic_regression
  n_estimators_grid: [200, 300, 500]           # More extensive search
  max_depth_grid: [15, 20, 30, null]           # More depth options
  min_samples_split_grid: [2, 5, 10]
  min_samples_leaf_grid: [1, 2, 4]
  cv_folds: 10                                 # More rigorous CV
  scoring: "roc_auc"
  n_jobs: -1

mlflow:
  # In a real deployment this would be a remote MLflow server
  # (e.g. http://mlflow.internal:5000); the compose stack ships no such
  # service, so the runnable default is the local file store.
  tracking_uri: "./mlruns"
  experiment_name: "churn_prediction_prod"
  log_models: true
  log_artifacts: true

# NOTE: drift thresholds are consumed by the SERVING layer, which reads them
# from environment variables (DRIFT_THRESHOLD_* in docker-compose.yml /
# .env). train.py validates but does not use this block; it documents the
# stricter values a production deployment would export.
drift:
  numeric_threshold: 0.15                      # Relative mean/std change (stricter)
  categorical_threshold: 0.20                  # PSI threshold (stricter)
  prediction_threshold: 0.08                   # Absolute churn-rate change (stricter)
  min_sample_size: 500                         # Larger sample requirement
  max_drift_batch_size: 5000                   # Larger batches allowed

