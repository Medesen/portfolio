# Kubernetes Secret for Churn Prediction API
#
# This Secret stores sensitive configuration values that should not be
# committed to version control. The values are base64-encoded (not encrypted).
#
# IMPORTANT:
# - DO NOT commit actual secrets to Git
# - Use external secrets management in production (e.g., Sealed Secrets, External Secrets Operator)
# - Rotate secrets regularly
# - Limit access via RBAC
#
# Usage:
#   1. Create secret from literal (recommended for production):
#      kubectl create secret generic churn-secrets \
#        --from-literal=service-token=YOUR_ACTUAL_TOKEN \
#        --namespace=default
#
#   2. Or apply this manifest (for development only):
#      kubectl apply -f k8s/secret.yaml
#
# To encode a secret value:
#   echo -n "your-secret-token" | base64

apiVersion: v1
kind: Secret
metadata:
  name: churn-secrets
  namespace: default
  labels:
    app: churn-api
    component: security
  annotations:
    description: "Secrets for churn prediction API"
type: Opaque
# stringData holds a NON-FUNCTIONAL placeholder in plaintext (Kubernetes
# base64-encodes it on apply). This is intentional: this manifest ships no real,
# usable token. Do NOT apply it as-is for anything reachable — replace the value,
# or better, create the secret from a real value out-of-band:
#   kubectl create secret generic churn-secrets \
#     --from-literal=service-token="$(openssl rand -hex 32)" --namespace=default
# and use a secrets manager (Sealed Secrets, External Secrets Operator, Vault)
# in production.
stringData:
  service-token: "REPLACE_WITH_YOUR_SERVICE_TOKEN"

