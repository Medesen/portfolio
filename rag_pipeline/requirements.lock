# Pinned dependency lock for the RAG pipeline (runtime deps only — test and
# dev tooling lives in requirements-dev.txt, which CI installs alongside this).
#
# Full `pip freeze` of a clean `pip install -r requirements.txt` on Python 3.11
# (the project Dockerfile / CI base). requirements.txt holds the human-readable
# intent (lower bounds); this file pins exact versions so Docker builds and CI
# installs are reproducible. PyTorch is the CPU build (the pipeline is a
# CPU-local application) — the extra index below is required to resolve the
# +cpu wheels. Analysis/notebook extras live in requirements-dev.txt.
# Regenerate after editing requirements.txt with:
#
#   docker run --rm -v "$PWD":/app:ro -w /tmp python:3.11-slim \
#     bash -c "cp /app/requirements.txt . && pip install -q -r requirements.txt && pip freeze" \
#     > requirements.lock   # then re-add the --extra-index-url line below
#
--extra-index-url https://download.pytorch.org/whl/cpu
